name: Build and Release AgentArmor Studio

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install "agentarmor @ git+https://github.com/Agastya910/agentarmor.git"
          pip install uvicorn fastapi httpx pydantic python-dotenv presidio-analyzer presidio-anonymizer

      - name: Build Python sidecar
        working-directory: sidecar
        run: |
          pyinstaller --noconfirm --distpath dist agentarmor_sidecar.spec
          ls dist/

      - name: Stage sidecar binary
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          $triple = "x86_64-pc-windows-msvc"
          Copy-Item "sidecar/dist/agentarmor-sidecar.exe" "src-tauri/binaries/agentarmor-sidecar-$triple.exe"
          ls src-tauri/binaries/

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AgentArmor Studio ${{ github.ref_name }}'
          releaseBody: |
            ## AgentArmor Studio ${{ github.ref_name }}

            Desktop application for building, deploying, and monitoring AI agents with 8-layer defense-in-depth security.

            ### Installation
            1. Download the `.exe` installer below
            2. Run the installer
            3. Ensure [Ollama](https://ollama.com) is installed for local LLM support
            4. Launch AgentArmor Studio

            ### Requirements
            - Windows 10/11 (x64)
            - [Ollama](https://ollama.com) for local model inference
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
